services:
  api:
    build:
      context: ./car-brands-api
    container_name: car-brands-api
    environment:
      SERVER_PORT: ${API_INTERNAL_PORT:-8080}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
    ports:
      - "${API_PORT:-8080}:${API_INTERNAL_PORT:-8080}"
    volumes:
      - api-data:/app/data

  client:
    build:
      context: ./car-brands-client
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8080/api}
        VITE_FRONTEND_URL: ${VITE_FRONTEND_URL:-http://localhost:5173}
    container_name: car-brands-client
    depends_on:
      - api
    ports:
      - "${FRONTEND_PORT:-5173}:4173"

volumes:
  api-data:
